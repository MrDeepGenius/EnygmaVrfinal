name: Build Web & APK Release

on:
  push:
    branches: [master, main]
    paths:
      - 'artifacts/enygma/**'
      - 'artifacts/api-server/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    outputs:
      build-success: ${{ steps.build.outcome }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build frontend
        id: build
        run: pnpm --filter @workspace/enygma run build
      
      - name: Build API
        run: pnpm --filter @workspace/api-server run build
      
      - name: Upload web artifacts
        uses: actions/upload-artifact@v3
        with:
          name: enygma-web-build
          path: |
            artifacts/enygma/dist/
            artifacts/api-server/dist/
          retention-days: 5

  build-apk:
    runs-on: ubuntu-latest
    needs: build-web
    if: needs.build-web.outputs.build-success == 'success'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools-version: 34.0.0
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build web for Android
        run: pnpm --filter @workspace/enygma run build
      
      - name: Setup Capacitor
        run: |
          cd artifacts/enygma
          pnpm add -D @capacitor/core @capacitor/cli @capacitor/android
      
      - name: Initialize Capacitor
        run: |
          cd artifacts/enygma
          npx cap add android 2>/dev/null || true
          npx cap sync android
      
      - name: Build APK Release
        run: |
          cd artifacts/enygma/android
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace
      
      - name: Build APK Debug
        run: |
          cd artifacts/enygma/android
          ./gradlew assembleDebug --stacktrace
      
      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enygma-apk-release
          path: artifacts/enygma/android/app/build/outputs/bundle/release/**/*.aab
          if-no-files-found: ignore
          retention-days: 30
      
      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enygma-apk-debug
          path: artifacts/enygma/android/app/build/outputs/apk/debug/**/*.apk
          if-no-files-found: ignore
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/enygma/android/app/build/outputs/apk/debug/**/*.apk
            artifacts/enygma/android/app/build/outputs/bundle/release/**/*.aab
          draft: false
          prerelease: false
