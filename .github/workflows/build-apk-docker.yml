name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install global dependencies
        run: npm install -g @capacitor/cli
      
      - name: Install project dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build web
        run: pnpm --filter @workspace/enygma run build
      
      - name: Setup Capacitor project
        run: |
          cd artifacts/enygma
          cap add android || true
          cap copy
          cap sync
      
      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx2048m" > ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
      
      - name: Build APK Debug
        run: |
          cd artifacts/enygma/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint
      
      - name: Upload APK Debug
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: enygma-debug-apk
          path: artifacts/enygma/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: artifacts/enygma/android/build/reports/**
          if-no-files-found: ignore

