name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.26.1
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build web
        run: pnpm --filter @workspace/enygma run build
      
      - name: Setup Capacitor Android
        run: |
          cd artifacts/enygma
          pnpm add -D @capacitor/core @capacitor/cli @capacitor/android @capacitor/app
          npx cap add android || true
          npx cap copy
          npx cap sync
      
      - name: Configure gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m" > ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
      
      - name: Build APK Debug
        continue-on-error: true
        run: |
          cd artifacts/enygma/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Build APK Release
        continue-on-error: true
        run: |
          cd artifacts/enygma/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enygma-apks
          path: |
            artifacts/enygma/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30
